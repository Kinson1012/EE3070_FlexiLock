<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CityU FlexLocker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --text: #162033;
            --muted: #5f6b85;
            --primary: #355cff;
            --surface: rgba(255,255,255,0.82);
            --shadow: 0 18px 45px rgba(34,50,84,0.12);
            --radius-xl: 28px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(53,92,255,0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(57,196,172,0.12), transparent 22%),
                linear-gradient(180deg, #f8faff 0%, #f4f6fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .register-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 0.9rem;
            margin-bottom: 1rem;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 0.95rem;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #355cff, #5a78ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .msg {
            margin-bottom: 1rem;
            color: #c0392b;
            font-size: 0.92rem;
        }

        p {
            margin-top: 1rem;
            color: var(--muted);
            font-size: 0.92rem;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>Create Account</h1>

        {% if messages %}
            {% for message in messages %}
                <p class="msg">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</body>
</html>
