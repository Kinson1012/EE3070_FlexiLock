<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Locker | FlexiLock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(53,92,255,0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(57,196,172,0.12), transparent 22%),
                linear-gradient(180deg, #f8faff 0%, #f4f6fb 100%);
            margin: 0;
            color: #162033;
        }

        .container {
            max-width: 720px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
        }

        p {
            color: #5f6b85;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 18px 0 8px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d9dfeb;
            font-size: 15px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #355cff;
            color: white;
        }

        .btn-outline {
            background: white;
            color: #162033;
            border: 1px solid #d9dfeb;
        }

        .message {
            padding: 12px 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            background: #eef2ff;
            color: #2446d8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Reserve {{ locker.locker_number }}</h1>
            <p>{{ locker.location }}</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <label for="start_time">Start Time</label>
                <input type="datetime-local" id="start_time" name="start_time" required>

                <label for="duration_hours">Duration</label>
                <select id="duration_hours" name="duration_hours" required>
                    <option value="">Select duration</option>
                    <option value="1">1 hour</option>
                    <option value="2">2 hours</option>
                    <option value="4">4 hours</option>
                    <option value="8">8 hours</option>
                    <option value="24">24 hours</option>
                    <option value="72">3 days</option>
                    <option value="168">1 week</option>
                </select>

                <div class="btn-row">
                    <button type="submit" class="btn btn-primary">Confirm Reservation</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline">Back</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
